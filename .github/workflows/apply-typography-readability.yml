name: Apply typography readability updates

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update-typography:
    if: github.event.issue.title == 'Apply portfolio typography readability updates v2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Confirm typography checks fail before the change
        shell: bash
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path

          html = Path('index.html').read_text(encoding='utf-8')
          compact = html.replace(' ', '')
          assert 'pretendard/dist/web/static/pretendard.css' in html
          assert 'max-width:48rem' in compact
          assert 'color:#667085' in compact
          assert 'font-weight:850' not in compact
          PY
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Typography requirements already pass; refusing to apply an unnecessary patch."
            exit 1
          fi
          echo "RED confirmed: the current page does not yet satisfy the typography requirements."

      - name: Apply focused typography changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index_path = Path('index.html')
          html = index_path.read_text(encoding='utf-8')

          def replace_once(old: str, new: str) -> None:
              global html
              count = html.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:100]!r}')
              html = html.replace(old, new, 1)

          def update_rule(selector: str, replacements: list[tuple[str, str]]) -> None:
              global html
              pattern = re.compile(rf'(?P<rule>{re.escape(selector)}\s*\{{.*?\n    \}})', re.S)
              matches = list(pattern.finditer(html))
              if len(matches) != 1:
                  raise SystemExit(f'Expected one CSS rule for {selector!r}, found {len(matches)}')
              match = matches[0]
              rule = match.group('rule')
              for old, new in replacements:
                  count = rule.count(old)
                  if count != 1:
                      raise SystemExit(
                          f'Expected one property match in {selector!r}, found {count}: {old!r}'
                      )
                  rule = rule.replace(old, new, 1)
              html = html[:match.start('rule')] + rule + html[match.end('rule'):]

          replace_once(
              '  <title>조정빈 | Embedded SW QA Portfolio</title>\n  <style>',
              '  <title>조정빈 | Embedded SW QA Portfolio</title>\n'
              '  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>\n'
              '  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">\n'
              '  <style>',
          )

          update_rule('body', [
              (
                  'font-family: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;',
                  'font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;\n      font-size: 16px;\n      font-weight: 400;',
              ),
          ])
          update_rule('.brand', [('font-weight: 850;', 'font-weight: 800;')])
          update_rule('.desktop-nav', [('font-size: 14px;', 'font-size: 15px;')])
          update_rule('.eyebrow,\n    .section-kicker', [('font-weight: 850;', 'font-weight: 700;')])
          update_rule('.hero-copy', [
              ('max-width: 690px;', 'max-width: 45rem;'),
              ('font-size: 16px;', 'font-size: 17px;'),
          ])
          update_rule('.summary-list span', [('font-size: 12px;', 'font-size: 13px;')])
          update_rule('.project-label', [('font-weight: 850;', 'font-weight: 700;')])
          update_rule('.project-intro p', [('max-width: 920px;', 'max-width: 48rem;')])
          update_rule('.project-metric span', [('font-size: 12px;', 'font-size: 13px;')])
          update_rule('.project-details dt', [('font-weight: 850;', 'font-weight: 700;')])
          update_rule('.project-details dd', [('margin: 0;', 'max-width: 48rem;\n      margin: 0;')])
          update_rule('.project-detail-toggle', [('font-weight: 850;', 'font-weight: 700;')])
          update_rule('.flow-line', [('font-weight: 750;', 'font-weight: 700;')])
          update_rule('.project-note', [('font-size: 12px;', 'font-size: 13px;')])
          update_rule('.evidence-caption', [
              ('font-size: 12px;', 'font-size: 13px;'),
              ('font-weight: 750;', 'font-weight: 700;'),
          ])
          update_rule('.fit-card .index', [
              ('color: #98a4b3;', 'color: #667085;'),
              ('font-size: 11px;', 'font-size: 12px;'),
              ('font-weight: 850;', 'font-weight: 700;'),
          ])
          update_rule('.credential-list span', [('font-size: 12px;', 'font-size: 13px;')])
          update_rule('.credential-evidence-copy small', [
              ('font-size: 12px;', 'font-size: 13px;'),
              ('font-weight: 800;', 'font-weight: 700;'),
          ])

          compact = html.replace(' ', '')
          required = [
              'pretendard/dist/web/static/pretendard.css',
              'font-family:"Pretendard","NotoSansKR","MalgunGothic"',
              'font-size:13px',
              'max-width:48rem',
              'color:#667085',
          ]
          for marker in required:
              if marker not in compact and marker not in html:
                  raise SystemExit(f'Missing required marker after patch: {marker}')
          if 'font-weight:850' in compact:
              raise SystemExit('font-weight: 850 remains after patch')

          index_path.write_text(html, encoding='utf-8')

          test_path = Path('tests/test_portfolio.py')
          tests = test_path.read_text(encoding='utf-8')
          if 'def test_typography_and_readability_requirements' not in tests:
              method = '''\n    def test_typography_and_readability_requirements(self):\n        compact = self.html.replace(" ", "")\n        self.assertIn("pretendard/dist/web/static/pretendard.css", self.html)\n        self.assertIn('font-family:"Pretendard","NotoSansKR","MalgunGothic"', compact)\n        self.assertIn("font-size:13px", compact)\n        self.assertGreaterEqual(compact.count("max-width:48rem"), 2)\n        self.assertIn("color:#667085", compact)\n        self.assertNotIn("font-weight:850", compact)\n'''
              anchor = '\n\nif __name__ == "__main__":\n'
              if anchor not in tests:
                  raise SystemExit('Could not locate unittest insertion anchor')
              tests = tests.replace(anchor, method + anchor, 1)
              test_path.write_text(tests, encoding='utf-8')
          PY

      - name: Run portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tests/test_portfolio.py
          git commit -m "Improve portfolio typography and readability"
          git push origin HEAD:main

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body "Typography and readability changes applied; all portfolio tests passed."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body "Typography update workflow failed. Review the Actions log for the failing step."
