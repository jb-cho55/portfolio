name: Apply portfolio refinements on PR

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'feat/project-detail-accordions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Apply approved refinements
        run: python scripts/refine_portfolio.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Commit refinements to feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md tests/test_portfolio.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: refine project evidence and bootloader story [skip ci]"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
