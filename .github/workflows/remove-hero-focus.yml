name: Remove hero focus copy

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-hero-focus.yml

permissions:
  contents: write

jobs:
  remove-copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove requested homepage copy
        shell: python
        run: |
          from pathlib import Path

          index_path = Path("index.html")
          workflow_path = Path(".github/workflows/remove-hero-focus.yml")
          target = '          <p class="hero-focus">대표 증거: OTA Bootloader 구현 · 요구사양 기반 ECU 검증 · Trace32/CAN Trace 원인 분석</p>\n'

          content = index_path.read_text(encoding="utf-8")
          if target not in content:
              raise SystemExit("Target homepage copy was not found.")

          index_path.write_text(content.replace(target, "", 1), encoding="utf-8")
          workflow_path.unlink()

      - name: Commit homepage update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/remove-hero-focus.yml
          git commit -m "Remove hero evidence copy"
          git push
