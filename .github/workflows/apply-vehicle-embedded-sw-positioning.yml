name: Apply Vehicle Embedded SW positioning

on:
  push:
    branches:
      - update/vehicle-embedded-sw-positioning

permissions:
  contents: write

jobs:
  update-positioning:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: update/vehicle-embedded-sw-positioning
          fetch-depth: 0

      - name: Apply approved content changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          replacements = {
              '<meta name="description" content="조정빈의 Embedded SW QA 기업 제출용 포트폴리오. 차량 SW 테스트 설계, 자동화 검증, Embedded 플랫폼 문제 해결 경험을 소개합니다.">': '<meta name="description" content="조정빈의 Vehicle Embedded SW 기업 제출용 포트폴리오. AURIX 기반 Embedded SW 구현, 차량 통신·진단, 테스트 자동화와 디버깅 경험을 소개합니다.">',
              '<meta property="og:title" content="조정빈 | Embedded SW QA Portfolio">': '<meta property="og:title" content="조정빈 | Vehicle Embedded SW Portfolio">',
              '<meta property="og:description" content="차량 SW 테스트 설계, 자동화 검증, 결함 분석, OTA Bootloader 경험을 정리한 기업 제출용 포트폴리오입니다.">': '<meta property="og:description" content="AURIX 기반 Embedded SW 구현, 차량 통신·진단, 테스트 자동화와 디버깅 경험을 정리한 기업 제출용 포트폴리오입니다.">',
              '<title>조정빈 | Embedded SW QA Portfolio</title>': '<title>조정빈 | Vehicle Embedded SW Portfolio</title>',
              '<p class="eyebrow">Embedded SW QA Portfolio</p>': '<p class="eyebrow">Vehicle Embedded SW Portfolio</p>',
              '<h1>조정빈<span>Embedded SW QA Engineer</span></h1>': '<h1>조정빈<span>Vehicle Embedded SW Engineer</span></h1>',
              '<p class="hero-copy">국민대학교 자동차IT융합학과에서 자동차·전자·소프트웨어를 학습하고, CANoe/CAPL 기반 차량 SW 테스트 설계와 자동화 검증을 수행했습니다.</p>': '<p class="hero-copy">국민대학교 자동차IT융합학과에서 자동차·전자·소프트웨어를 학습하고, AURIX 기반 Embedded SW 구현과 CANoe/CAPL 기반 차량 SW 검증을 수행했습니다.</p>',
              '<p>도구 이름보다 실제 검증 업무에서 수행한 행동을 중심으로 정리했습니다.</p>': '<p>차량 SW 개발과 검증 프로젝트에서 수행한 설계·구현·테스트·문제 해결 역량을 중심으로 정리했습니다.</p>',
              '<small>TEST DESIGN</small>': '<small>EMBEDDED IMPLEMENTATION</small>',
              '<h3>요구사양 기반 테스트 설계</h3>': '<h3>Embedded C 기반 ECU 기능 구현</h3>',
              '<p>요구사양을 전제조건·입력·기대 결과·판정 기준으로 구조화했습니다.</p>': '<p>AURIX 환경에서 UDS Bootloader, Flash Backup·Restore, SHA-256 무결성 검사 기능을 구현했습니다.</p>',
              '<small>TEST AUTOMATION</small>': '<small>VEHICLE COMMUNICATION</small>',
              '<h3>CANoe/CAPL 자동화</h3>': '<h3>차량 통신 및 진단 프로토콜 활용</h3>',
              '<p>반복 검증 시나리오를 자동화하고 동일 조건의 회귀 테스트를 수행했습니다.</p>': '<p>CAN·ISO-TP·UDS 통신 흐름을 이해하고 진단 서비스와 ECU 리프로그래밍 절차에 적용했습니다.</p>',
              '<small>DEFECT ANALYSIS</small>': '<small>TEST ENGINEERING</small>',
              '<h3>결함 조건 및 원인 분석</h3>': '<h3>요구사양 기반 테스트 설계·자동화</h3>',
              '<p>CAN Trace와 Signal 상태를 비교해 결함 재현 조건과 영향 범위를 좁혔습니다.</p>': '<p>요구사양을 테스트 조건과 판정 기준으로 구조화하고 CANoe/CAPL로 반복 시험을 자동화했습니다.</p>',
              '<small>EMBEDDED SW</small>': '<small>DEBUGGING &amp; ANALYSIS</small>',
              '<h3>차량 SW 구조 이해</h3>': '<h3>디버깅 및 결함 원인 분석</h3>',
              '<p>CAN·UDS·AUTOSAR·A-SPICE와 Bootloader를 기반으로 차량 SW 개발·검증 흐름을 학습했습니다.</p>': '<p>CAN Trace와 Trace32를 활용해 통신 동작과 Memory Alignment 오류의 재현 조건과 원인을 분석했습니다.</p>',
          }

          for old, new in replacements.items():
              count = html.count(old)
              if count != 1:
                  raise SystemExit(f"Expected exactly one occurrence, found {count}: {old}")
              html = html.replace(old, new)

          index_path.write_text(html, encoding="utf-8")

          test_path = Path("tests/test_portfolio.py")
          tests = test_path.read_text(encoding="utf-8")
          old_hero = "국민대학교 자동차IT융합학과에서 자동차·전자·소프트웨어를 학습하고, CANoe/CAPL 기반 차량 SW 테스트 설계와 자동화 검증을 수행했습니다."
          new_hero = "국민대학교 자동차IT융합학과에서 자동차·전자·소프트웨어를 학습하고, AURIX 기반 Embedded SW 구현과 CANoe/CAPL 기반 차량 SW 검증을 수행했습니다."
          if tests.count(old_hero) != 1:
              raise SystemExit("Expected the old hero assertion exactly once")
          tests = tests.replace(old_hero, new_hero)

          marker = "    def test_project_is_prioritized_before_core_fit(self):\n"
          new_test = '''    def test_vehicle_embedded_sw_positioning_and_competencies(self):
        self.assertIn("Vehicle Embedded SW Portfolio", self.html)
        self.assertIn("Vehicle Embedded SW Engineer", self.html)
        self.assertNotIn("Embedded SW QA Portfolio", self.html)
        self.assertNotIn("Embedded SW QA Engineer", self.html)
        expected = [
            "차량 SW 개발과 검증 프로젝트에서 수행한 설계·구현·테스트·문제 해결 역량을 중심으로 정리했습니다.",
            "EMBEDDED IMPLEMENTATION",
            "Embedded C 기반 ECU 기능 구현",
            "AURIX 환경에서 UDS Bootloader, Flash Backup·Restore, SHA-256 무결성 검사 기능을 구현했습니다.",
            "VEHICLE COMMUNICATION",
            "차량 통신 및 진단 프로토콜 활용",
            "CAN·ISO-TP·UDS 통신 흐름을 이해하고 진단 서비스와 ECU 리프로그래밍 절차에 적용했습니다.",
            "TEST ENGINEERING",
            "요구사양 기반 테스트 설계·자동화",
            "요구사양을 테스트 조건과 판정 기준으로 구조화하고 CANoe/CAPL로 반복 시험을 자동화했습니다.",
            "DEBUGGING &amp; ANALYSIS",
            "디버깅 및 결함 원인 분석",
            "CAN Trace와 Trace32를 활용해 통신 동작과 Memory Alignment 오류의 재현 조건과 원인을 분석했습니다.",
        ]
        for content in expected:
            self.assertIn(content, self.html)

'''
          if tests.count(marker) != 1:
              raise SystemExit("Could not find the test insertion marker exactly once")
          tests = tests.replace(marker, new_test + marker)
          test_path.write_text(tests, encoding="utf-8")
          PY

      - name: Run portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Verify positioning strings
        shell: bash
        run: |
          grep -q "Vehicle Embedded SW Engineer" index.html
          grep -q "Embedded C 기반 ECU 기능 구현" index.html
          grep -q "차량 통신 및 진단 프로토콜 활용" index.html
          grep -q "요구사양 기반 테스트 설계·자동화" index.html
          grep -q "디버깅 및 결함 원인 분석" index.html
          ! grep -q "Embedded SW QA Portfolio" index.html
          ! grep -q "Embedded SW QA Engineer" index.html

      - name: Commit verified changes and remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/apply-vehicle-embedded-sw-positioning.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html tests/test_portfolio.py .github/workflows/apply-vehicle-embedded-sw-positioning.yml
          git commit -m "refactor: position portfolio for vehicle embedded SW"
          git push origin update/vehicle-embedded-sw-positioning
