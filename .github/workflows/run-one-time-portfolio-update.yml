name: Verify portfolio update

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Run portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Verify final content
        shell: bash
        run: |
          grep -q "Vehicle Embedded SW Engineer" index.html
          grep -q "Embedded C 기반 ECU 기능 구현" index.html
          grep -q "차량 통신 및 진단 프로토콜 활용" index.html
          grep -q "요구사양 기반 테스트 설계·자동화" index.html
          grep -q "디버깅 및 결함 원인 분석" index.html
          ! grep -q "Embedded SW QA Portfolio" index.html
          ! grep -q "Embedded SW QA Engineer" index.html
