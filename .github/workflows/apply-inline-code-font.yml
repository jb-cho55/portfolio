name: Apply inline code font style

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-inline-code-style:
    if: github.event.pull_request.title == 'Apply inline code font style'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Confirm regression test fails before fix
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_inline_code_style -v > red.log 2>&1
          status=$?
          set -e
          cat red.log
          if [ "$status" -eq 0 ]; then
            echo "Regression test unexpectedly passed before the CSS fix."
            exit 1
          fi
          grep -q "Missing .debug-step code CSS rule" red.log
          echo "RED confirmed: inline code still uses the browser default font."

      - name: Apply inherited Pretendard style to debug code
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          anchor = (
              "    .debug-step {\n"
              "      padding: 12px 14px;\n"
              "      border-left: 3px solid var(--blue);\n"
              "      background: var(--blue-soft);\n"
              "      color: #394962;\n"
              "      font-size: 14px;\n"
              "    }\n"
          )
          addition = (
              "\n    .debug-step code {\n"
              "      font-family: inherit;\n"
              "      font-size: inherit;\n"
              "      font-weight: 700;\n"
              "      color: var(--navy);\n"
              "    }\n"
          )

          if ".debug-step code {" in html:
              raise SystemExit(".debug-step code rule already exists")
          if html.count(anchor) != 1:
              raise SystemExit(f"Expected one .debug-step rule, found {html.count(anchor)}")

          html = html.replace(anchor, anchor + addition, 1)
          path.write_text(html, encoding="utf-8")
          PY

      - name: Run all portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Commit and push fix
        run: |
          rm -f .github/inline-code-trigger.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use portfolio font for inline debug code"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Report success
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "Inline code typography updated; the regression test and full portfolio test suite passed."

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body "Inline code typography workflow failed. Review the Actions log for the failing step."
