name: Rebuild portfolio Pages once

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write
  pages: write

jobs:
  rebuild:
    if: github.event.issue.title == '[deploy] Rebuild portfolio Pages for PR 13'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Request Pages rebuild and verify deployment
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail

          site_url="https://jb-cho55.github.io/portfolio/"
          expected_marker="PROJECT 01 · EMBEDDED SW DEVELOPMENT"
          old_marker="PROJECT 01 · VEHICLE SW TESTING"
          body_file="$(mktemp)"
          header_file="$(mktemp)"
          report_file="$(mktemp)"

          repo_expected_count=$(grep -c "$expected_marker" index.html || true)
          if [ "$repo_expected_count" -eq 0 ]; then
            echo "Expected marker is missing from main/index.html"
            exit 1
          fi

          fetch_live() {
            local suffix="$1"
            curl -fsSL \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              -D "$header_file" \
              "${site_url}?deploy=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${suffix}" \
              -o "$body_file"
          }

          fetch_live before
          before_expected_count=$(grep -c "$expected_marker" "$body_file" || true)
          before_old_count=$(grep -c "$old_marker" "$body_file" || true)
          last_modified_before=$(grep -i '^last-modified:' "$header_file" | tr -d '\r' || true)
          etag_before=$(grep -i '^etag:' "$header_file" | tr -d '\r' || true)

          pages_info=$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>&1 || true)
          latest_before=$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" 2>&1 || true)
          rebuild_result="not requested because live page was already current"

          if [ "$before_expected_count" -eq 0 ]; then
            rebuild_result=$(gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" 2>&1 || true)
          fi

          final_expected_count="$before_expected_count"
          final_old_count="$before_old_count"
          if [ "$final_expected_count" -eq 0 ]; then
            for attempt in $(seq 1 36); do
              sleep 10
              if fetch_live "$attempt"; then
                final_expected_count=$(grep -c "$expected_marker" "$body_file" || true)
                final_old_count=$(grep -c "$old_marker" "$body_file" || true)
                if [ "$final_expected_count" -gt 0 ]; then
                  break
                fi
              fi
            done
          fi

          last_modified_after=$(grep -i '^last-modified:' "$header_file" | tr -d '\r' || true)
          etag_after=$(grep -i '^etag:' "$header_file" | tr -d '\r' || true)
          latest_after=$(gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest" 2>&1 || true)

          final_state="STALE"
          if [ "$final_expected_count" -gt 0 ]; then
            final_state="UPDATED"
          fi

          {
            echo "## GitHub Pages rebuild result"
            echo
            echo "- Final state: **${final_state}**"
            echo "- Repository main expected marker count: ${repo_expected_count}"
            echo "- Live expected marker count before rebuild: ${before_expected_count}"
            echo "- Live old marker count before rebuild: ${before_old_count}"
            echo "- Live expected marker count after rebuild: ${final_expected_count}"
            echo "- Live old marker count after rebuild: ${final_old_count}"
            echo "- ${last_modified_before:-last-modified before: unavailable}"
            echo "- ${etag_before:-etag before: unavailable}"
            echo "- ${last_modified_after:-last-modified after: unavailable}"
            echo "- ${etag_after:-etag after: unavailable}"
            echo
            echo "### Pages configuration"
            echo '```json'
            echo "$pages_info"
            echo '```'
            echo
            echo "### Latest build before"
            echo '```json'
            echo "$latest_before"
            echo '```'
            echo
            echo "### Rebuild API result"
            echo '```text'
            echo "$rebuild_result"
            echo '```'
            echo
            echo "### Latest build after"
            echo '```json'
            echo "$latest_after"
            echo '```'
          } > "$report_file"

          gh issue comment "$ISSUE_NUMBER" --body-file "$report_file"

          if [ "$final_state" != "UPDATED" ]; then
            exit 1
          fi
