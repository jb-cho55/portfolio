name: Remove hero focus copy once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/remove-hero-focus-once.yml

permissions:
  contents: write
  issues: write

jobs:
  remove-copy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove requested hero copy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          target = '          <p class="hero-focus">대표 증거: OTA Bootloader 구현 · 요구사양 기반 ECU 검증 · Trace32/CAN Trace 원인 분석</p>\n'

          if text.count(target) != 1:
              raise SystemExit(f'expected one target paragraph, found {text.count(target)}')

          path.write_text(text.replace(target, ''), encoding='utf-8')
          PY

      - name: Run portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Verify requested copy is absent
        shell: bash
        run: |
          if grep -Fq '대표 증거: OTA Bootloader 구현 · 요구사양 기반 ECU 검증 · Trace32/CAN Trace 원인 분석' index.html; then
            echo 'Requested hero copy is still present.'
            exit 1
          fi

      - name: Remove temporary workflow and publish
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: '15'
        shell: bash
        run: |
          rm .github/workflows/remove-hero-focus-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/remove-hero-focus-once.yml
          git commit -m 'content: remove hero evidence line'
          git push origin HEAD:main
          commit_sha=$(git rev-parse HEAD)
          gh issue comment "$ISSUE_NUMBER" --body "Hero 문구를 제거했고 전체 포트폴리오 테스트를 통과했습니다. 임시 워크플로도 함께 삭제했습니다. Commit: \`${commit_sha}\`"
          gh issue close "$ISSUE_NUMBER" --reason completed
