name: Remove hero focus copy once

on:
  push:
    branches: [main]
    paths:
      - .github/hero-copy-cleanup.trigger

permissions:
  contents: write

jobs:
  remove-copy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Remove requested hero copy
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          target = '          <p class="hero-focus">대표 증거: OTA Bootloader 구현 · 요구사양 기반 ECU 검증 · Trace32/CAN Trace 원인 분석</p>\n'

          if text.count(target) != 1:
              raise SystemExit(f'expected one target paragraph, found {text.count(target)}')

          path.write_text(text.replace(target, ''), encoding='utf-8')
          PY

      - name: Run portfolio tests
        run: python -m unittest discover -s tests -v

      - name: Verify requested copy is absent
        shell: bash
        run: |
          ! grep -Fq '대표 증거: OTA Bootloader 구현 · 요구사양 기반 ECU 검증 · Trace32/CAN Trace 원인 분석' index.html

      - name: Remove temporary files and publish
        shell: bash
        run: |
          rm .github/workflows/remove-hero-focus-once.yml
          rm .github/hero-copy-cleanup.trigger
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html .github/workflows/remove-hero-focus-once.yml .github/hero-copy-cleanup.trigger
          git commit -m 'content: remove hero evidence line'
          git push origin HEAD:main
