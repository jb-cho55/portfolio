<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Panel 및 Trace 검증 구조</title><desc id="desc">Panel에서 입력 신호를 제어하고 Trace에서 CAN 메시지와 상태 변화를 확인하는 포트폴리오용 화면 구성</desc>
  <rect width="1280" height="720" fill="#f5f7fa"/>
  <rect x="45" y="45" width="1190" height="630" rx="22" fill="#fff" stroke="#d8e0ea" stroke-width="3"/>
  <text x="85" y="102" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0b1f3a">Panel Input &amp; CAN Trace</text>
  <text x="85" y="138" font-family="Arial, sans-serif" font-size="20" fill="#607086">Manual input control and message-level verification</text>
  <rect x="80" y="180" width="460" height="430" rx="16" fill="#f8fafc" stroke="#cfd9e5" stroke-width="3"/>
  <rect x="565" y="180" width="635" height="430" rx="16" fill="#0e1726" stroke="#24344c" stroke-width="3"/>
  <text x="115" y="225" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0b1f3a">Control Panel</text>
  <g font-family="Arial, sans-serif">
    <text x="115" y="282" font-size="18" fill="#52657d">Batt Percent</text><rect x="280" y="258" width="205" height="32" rx="16" fill="#dce7f5"/><rect x="280" y="258" width="45" height="32" rx="16" fill="#216fe6"/><text x="445" y="282" font-size="17" fill="#0b1f3a">15%</text>
    <text x="115" y="345" font-size="18" fill="#52657d">Ignition</text><rect x="280" y="320" width="100" height="38" rx="19" fill="#216fe6"/><circle cx="355" cy="339" r="15" fill="#fff"/><text x="405" y="345" font-size="17" fill="#0b1f3a">ON</text>
    <text x="115" y="408" font-size="18" fill="#52657d">Engine</text><rect x="280" y="383" width="100" height="38" rx="19" fill="#8fa1b7"/><circle cx="305" cy="402" r="15" fill="#fff"/><text x="405" y="408" font-size="17" fill="#0b1f3a">OFF</text>
    <rect x="115" y="470" width="370" height="70" rx="10" fill="#edf4ff" stroke="#216fe6" stroke-width="2"/><text x="300" y="502" text-anchor="middle" font-size="20" font-weight="700" fill="#0b1f3a">Send Test Input</text><text x="300" y="528" text-anchor="middle" font-size="15" fill="#52657d">Panel → CAN Signal</text>
  </g>
  <text x="600" y="225" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#dce8f6">Trace Window</text>
  <g font-family="monospace" font-size="17">
    <text x="600" y="275" fill="#80d4ff">Time</text><text x="720" y="275" fill="#80d4ff">Channel</text><text x="835" y="275" fill="#80d4ff">ID</text><text x="920" y="275" fill="#80d4ff">Data / Signal</text>
    <line x1="595" y1="290" x2="1165" y2="290" stroke="#34445c" stroke-width="2"/>
    <text x="600" y="330" fill="#a9b8ca">4.990</text><text x="720" y="330" fill="#a9b8ca">CAN 1</text><text x="835" y="330" fill="#ffd479">0x321</text><text x="920" y="330" fill="#dce8f6">Batt_Percent = 15</text>
    <text x="600" y="375" fill="#a9b8ca">5.000</text><text x="720" y="375" fill="#a9b8ca">CAN 1</text><text x="835" y="375" fill="#ffd479">0x610</text><text x="920" y="375" fill="#ff8c8c">Fault_Level = 0</text>
    <text x="600" y="420" fill="#a9b8ca">5.010</text><text x="720" y="420" fill="#a9b8ca">CAN 1</text><text x="835" y="420" fill="#ffd479">0x7E8</text><text x="920" y="420" fill="#dce8f6">UDS Fault Status Rsp</text>
    <rect x="590" y="455" width="580" height="95" rx="10" fill="#17243a" stroke="#ff7b7b" stroke-width="2"/>
    <text x="615" y="490" fill="#ff9c9c">Expected: Fault Level 2 detected</text>
    <text x="615" y="525" fill="#ff9c9c">Actual: Boundary value not detected</text>
  </g>
</svg>