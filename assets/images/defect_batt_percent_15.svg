<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Batt Percent 15% 경계값 Test Result</title><desc id="desc">기대 결과와 실제 결과를 비교해 경계값 결함을 요약한 포트폴리오용 테스트 결과 표</desc>
  <rect width="1280" height="720" fill="#f5f7fa"/>
  <rect x="55" y="45" width="1170" height="630" rx="22" fill="#fff" stroke="#d8e0ea" stroke-width="3"/>
  <text x="95" y="105" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0b1f3a">Test Result · Batt Percent 15% Boundary</text>
  <text x="95" y="142" font-family="Arial, sans-serif" font-size="20" fill="#607086">Representative dynamic defect summary</text>
  <g font-family="Arial, sans-serif">
    <rect x="95" y="190" width="1090" height="58" rx="8" fill="#0b1f3a"/>
    <text x="125" y="228" font-size="20" font-weight="700" fill="#fff">Test Item</text><text x="405" y="228" font-size="20" font-weight="700" fill="#fff">Input / Condition</text><text x="680" y="228" font-size="20" font-weight="700" fill="#fff">Expected</text><text x="955" y="228" font-size="20" font-weight="700" fill="#fff">Actual</text>
    <rect x="95" y="248" width="1090" height="118" fill="#f8fafc" stroke="#d8e0ea"/>
    <text x="125" y="300" font-size="19" font-weight="700" fill="#0b1f3a">Fault Detection</text><text x="405" y="300" font-size="19" fill="#52657d">Batt Percent = 15%</text><text x="680" y="300" font-size="19" fill="#216fe6">Fault Level 2</text><text x="955" y="300" font-size="19" fill="#c73b3b">Not detected</text>
    <text x="125" y="338" font-size="16" fill="#607086">Detection window</text><text x="405" y="338" font-size="16" fill="#607086">4,900–5,100 ms</text><text x="680" y="338" font-size="16" fill="#607086">Within window</text><text x="955" y="338" font-size="16" fill="#607086">Boundary miss</text>
    <rect x="95" y="395" width="1090" height="145" rx="12" fill="#fff5f5" stroke="#efb4b4" stroke-width="2"/>
    <text x="125" y="438" font-size="21" font-weight="700" fill="#9d2f2f">Defect Analysis</text>
    <text x="125" y="480" font-size="19" fill="#5f4a4a">15% 초과 구간에서는 정상 검출되지만 정확히 15%에서만 미검출</text>
    <text x="125" y="517" font-size="19" fill="#5f4a4a">→ 비교 조건의 경계 포함 누락 가능성: &lt; 대신 &lt;= 검토</text>
    <rect x="95" y="570" width="1090" height="55" rx="10" fill="#edf4ff"/>
    <text x="640" y="606" text-anchor="middle" font-size="18" font-weight="700" fill="#244a7c">Evidence: Panel input · CAN Trace · CAPL verdict · defect documentation</text>
  </g>
</svg>